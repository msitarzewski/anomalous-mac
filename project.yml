name: Anomalous
options:
  bundleIdPrefix: bot.anomalous
  deploymentTarget:
    macOS: "26.0"

packages:
  AnomalousCore:
    path: AnomalousCore
  # Sparkle auto-update (github.com/sparkle-project/Sparkle). SPM embeds
  # Sparkle.framework (with its XPC services + Autoupdate/Updater.app) into
  # the app bundle — these nested helpers MUST be Developer ID-signed at
  # release time; see memory-bank/build-deployment.md.
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.9.4"

schemes:
  Anomalous:
    build:
      targets:
        Anomalous: all
    test:
      gatherCoverageData: false
      targets:
        - package: AnomalousCore/AnomalousCoreTests

targets:
  # Privileged helper — runs as root via SMAppService.daemon. Same source
  # as the AnomalousHelper SwiftPM product; built here so it embeds in the
  # app bundle at Contents/MacOS/AnomalousHelper (per the LaunchDaemon plist's
  # BundleProgram).
  AnomalousHelper:
    type: tool
    platform: macOS
    sources:
      - AnomalousCore/Sources/AnomalousHelper
    dependencies:
      - package: AnomalousCore
        product: AnomalousCore
    settings:
      base:
        PRODUCT_NAME: AnomalousHelper
        PRODUCT_BUNDLE_IDENTIFIER: bot.anomalous.helper
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        CODE_SIGN_IDENTITY: "-"

  # Phase 4: WidgetKit appex — the ambient status widget + Control Center
  # controls. ExtensionKit extension (macOS 13+ WidgetKit form) embedded at
  # Contents/Extensions/. Shares SharedIntents.swift with the app (same App
  # Intents drive Siri/Shortcuts, the widget buttons, and Control Center) and
  # the asset catalog (the StatusMark for the at-rest state).
  AnomalousWidget:
    type: extensionkit-extension
    platform: macOS
    sources:
      - Widget/Sources
      - App/Sources/SharedIntents.swift
      - path: App/Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: AnomalousCore
        product: AnomalousCore
    info:
      path: Widget/Info.plist
      properties:
        CFBundleDisplayName: Anomalous
        # Keep in lockstep with the app target's versions below.
        CFBundleShortVersionString: "0.2.1"
        CFBundleVersion: "7"
        EXAppExtensionAttributes:
          EXExtensionPointIdentifier: com.apple.widgetkit-extension
    # xcodegen REGENERATES this file each `xcodegen generate` — the content
    # must live here, not in the file. Appexes must be sandboxed; the App
    # Group is the only bridge to the app (status JSON in, commands out).
    entitlements:
      path: Widget/AnomalousWidget.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.application-groups:
          - 7JQGQ7CRH8.bot.anomalous.sensor
        # Shared HMAC key for the App Group command channel. Same access group
        # + Team as the app → the widget can read the key the app minted;
        # other-team/unsigned malware is denied. Non-managed entitlement
        # ($(AppIdentifierPrefix) → team prefix), no provisioning profile.
        keychain-access-groups:
          - 7JQGQ7CRH8.bot.anomalous.sensor.shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bot.anomalous.sensor.widget
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # Weak-link FoundationModels here too — the widget links AnomalousCore
        # (which imports it), so it must never hard-fault on an incapable Mac.
        OTHER_LDFLAGS: -weak_framework FoundationModels
        CODE_SIGN_IDENTITY: "-"

  Anomalous:
    type: application
    platform: macOS
    sources:
      - App/Sources
      - path: App/Resources
        buildPhase: resources
    dependencies:
      - package: AnomalousCore
        product: AnomalousCore
      # Sparkle auto-update framework (linked + embedded in the app bundle).
      - package: Sparkle
        product: Sparkle
      # Build-order only: the helper must be built before the app embeds it.
      - target: AnomalousHelper
        embed: false
        link: false
      # The widget appex, embedded at Contents/Extensions/ (ExtensionKit).
      - target: AnomalousWidget
    # Place the root helper at Contents/MacOS/AnomalousHelper and the
    # LaunchDaemon plist at Contents/Library/LaunchDaemons/, exactly where
    # SMAppService.daemon(plistName:) + the plist's BundleProgram expect them.
    postBuildScripts:
      - name: Embed privileged helper + LaunchDaemon plist
        script: |
          set -e
          APP="$BUILT_PRODUCTS_DIR/$WRAPPER_NAME"
          mkdir -p "$APP/Contents/Library/LaunchDaemons"
          cp "$SRCROOT/App/LaunchDaemons/bot.anomalous.helper.plist" "$APP/Contents/Library/LaunchDaemons/"
          cp "$BUILT_PRODUCTS_DIR/AnomalousHelper" "$APP/Contents/MacOS/AnomalousHelper"
    # xcodegen REGENERATES this file each `xcodegen generate` — the content
    # must live here, not in the file. Phase 4 adds: the App Group shared
    # with the widget appex (status JSON + command queue) and the Time
    # Sensitive notification entitlement so a CONFIRMED (high-confidence)
    # anomaly may break Focus. sign.sh applies this file at signing time.
    entitlements:
      path: App/Anomalous.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.application-groups:
          - 7JQGQ7CRH8.bot.anomalous.sensor
        # Shared HMAC key for the App Group command channel (see the widget
        # target). The app mints it on first launch; the widget reads it.
        keychain-access-groups:
          - 7JQGQ7CRH8.bot.anomalous.sensor.shared
        # Restored 2026-07-05: a confirmed (high-confidence) anomaly posts
        # `.timeSensitive` to break Focus/DND. This is a MANAGED entitlement —
        # it AMFI-kills the app at launch UNLESS a provisioning profile
        # carrying it is embedded in the bundle. sign.sh embeds
        # App/Anomalous.provisionprofile (App ID bot.anomalous.sensor, valid to
        # 2044) as Contents/embedded.provisionprofile. The entitlement here MUST
        # remain a subset of that profile's entitlements or launch fails.
        com.apple.developer.usernotifications.time-sensitive: true
    info:
      path: App/Info.plist
      properties:
        CFBundleDisplayName: Anomalous
        CFBundleShortVersionString: "0.2.1"
        CFBundleVersion: "7"
        LSUIElement: true
        LSMinimumSystemVersion: "26.0"
        # ── Sparkle auto-update ──────────────────────────────────────────
        # Appcast served from anomalous.bot (published to the host serving it).
        SUFeedURL: https://anomalous.bot/appcast.xml
        # Enable Sparkle's installer XPC launcher so the (non-sandboxed,
        # Developer ID) app can install updates that land in /Applications.
        SUEnableInstallerLauncher: true
        # PLACEHOLDER — the real EdDSA public key is injected at release time
        # from Sparkle's `generate_keys` (private key stays in the login
        # Keychain and is NEVER committed). See memory-bank/build-deployment.md.
        # DO NOT commit a real key here.
        SUPublicEDKey: "OoRc2WZfiHX21nhhm/inmv5l282Ob97GBwx+fZoML/E="
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: bot.anomalous.sensor
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "26.0"
        # FoundationModels (Apple Intelligence) is WEAK-linked: the app must
        # LAUNCH even on a Mac whose FoundationModels build lacks a symbol we
        # reference (e.g. a @Generable card type's conformance) instead of dying
        # in dyld with "Symbol not found." All use is @available/availability-
        # gated, so a null symbol is never actually called on an incapable Mac.
        OTHER_LDFLAGS: -weak_framework FoundationModels
        # Liquid Glass app icon (Icon Composer .icon in App/Resources) + the
        # menu-bar template imagesets both live in the asset catalog / resources.
        # actool composes the .icon named "AppIcon" into every required size.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Dev builds: ad-hoc signing. Release: Developer ID + notarization +
        # Sparkle (reference release flow captured in build-deployment.md).
        # NOTE: SMAppService.daemon registration REQUIRES Developer ID signing;
        # ad-hoc dev builds can't register a system daemon — that's the
        # signing-identity blocker, not a code gap.
        CODE_SIGN_IDENTITY: "-"
